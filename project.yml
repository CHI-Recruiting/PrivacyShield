name: PrivacyShield
options:
  bundleIdPrefix: com.privacyshield
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"

targets:
  PrivacyShield:
    type: application
    platform: iOS
    sources:
      - path: PrivacyShield
        excludes:
          - "**/.DS_Store"
    resources:
      - path: PrivacyShield/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.privacyshield.app
        INFOPLIST_KEY_CFBundleDisplayName: PrivacyShield
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    info:
      path: PrivacyShield/Info.plist
      properties:
        CFBundleDisplayName: PrivacyShield
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

  ContentBlockerExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ContentBlockerExtension
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.privacyshield.app.blocker
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    info:
      path: ContentBlockerExtension/Info.plist
    dependencies:
      - target: PrivacyShield
        embed: false
